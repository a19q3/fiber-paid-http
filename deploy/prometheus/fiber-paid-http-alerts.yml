groups:
  - name: fiber-paid-http-gateway
    rules:
      - alert: FiberPaidHttpGatewayReadinessFailing
        expr: increase(fiber_paid_http_gateway_readiness_failures_total[5m]) > 0
        for: 2m
        labels:
          severity: page
        annotations:
          summary: Fiber Paid HTTP gateway readiness checks are failing
          description: The gateway is returning one or more failed readiness checks. Run `fiber-paid-http doctor --role gateway --config <config>` and inspect Fiber RPC peer/channel readiness.

      - alert: FiberPaidHttpGatewayHigh5xxRate
        expr: sum by (server_id) (rate(fiber_paid_http_gateway_responses_total{status=~"5.."}[5m])) > 0
        for: 5m
        labels:
          severity: page
        annotations:
          summary: Fiber Paid HTTP gateway is returning 5xx responses
          description: 5xx responses after credential redemption can create paid-but-denied cases. Check upstream health and `fiber-paid-http storage list-deliveries`.

      - alert: FiberPaidHttpGatewayRateLimited
        expr: increase(fiber_paid_http_gateway_rate_limit_rejections_total[5m]) > 10
        for: 5m
        labels:
          severity: ticket
        annotations:
          summary: Fiber Paid HTTP gateway is rate limiting callers
          description: The protected route rate limiter is rejecting requests. Check traffic source, abuse signals, and configured `operations.rate_limit`.

      - alert: FiberPaidHttpGatewayNoTraffic
        expr: absent(fiber_paid_http_gateway_requests_total)
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: Fiber Paid HTTP gateway metrics are missing
          description: Prometheus cannot see Fiber Paid HTTP gateway request metrics. Check scraping, `/metrics`, process health, and network binding.

